<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1
        {
            height: 350px;
            width: 350px;
            background-color: yellow;
            z-index: 2;
            position: relative;
        }
        .box2
        {
            height: 350px;
            width: 350px;
            background-color: orange;
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="box1">1</div>
    <div class="box2">2</div>
</body>
</html>
